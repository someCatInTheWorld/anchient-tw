name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout self
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Checkout scratch-gui
      uses: actions/checkout@v4
      with:
        repository: TurboWarp/scratch-gui
        path: scratch-gui
        persist-credentials: false
        ref: 4ae7c0ce64dc89ae9de7970780f7db3349ddb895
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Build
      # I'm not sure if TurboWarp forked scratch-blocks at this time.
      run: |
        cd scratch-gui
        npm ci --legacy-peer-deps
        npm install github:TurboWarp/scratch-vm#01c8ecd41c0932b9d30a0a24712636e2bffd0bad --legacy-peer-deps
        npm install github:TurboWarp/scratch-render#448c215925b5c709d8fcc961f9b57ffec88b06ea --legacy-peer-deps
        NODE_ENV=production NODE_OPTIONS=--openssl-legacy-provider ROUTING_STYLE=hash npm run build
    - name: Patch
      run: python3 patch.py
    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./scratch-gui/build/
        retention-days: 30

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
